<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Queue</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/dashboard.css') }}">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg bg-white shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold text-primary" href="/dashboard">
            <i class="bi bi-stack"></i>
            Queue Manager
        </a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">
                        <i class="bi bi-grid"></i>
                        Dashboard
                    </a>
                </li>

                <li class="nav-item ms-3">
                    <a class="nav-link" href="/manage">
                        <i class="bi bi-list-task"></i>
                        Manage Queue
                    </a>
                </li>

                <li class="nav-item ms-3">
                    <a class="nav-link active" href="/create">
                        <i class="bi bi-plus-circle"></i>
                        Create Queue
                    </a>
                </li>

            </ul>

            <div>

                <span class="fw-semibold me-3">
                    manager
                </span>

                <a href="/" class="text-danger text-decoration-none">
                    Logout
                </a>

            </div>

        </div>

    </div>

</nav>

<!-- ================= HEADER ================= -->

<div class="container mt-5">

    <div class="d-flex align-items-center mb-4">

        <div class="dashboard-icon">

            <i class="bi bi-plus-circle"></i>

        </div>

        <div class="ms-3">

            <h2 class="fw-bold">
                Create Queue
            </h2>

            <p class="text-muted">
                Set up a new queue in seconds
            </p>

        </div>

    </div>

<!-- ================= FORM ================= -->

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow border-0 rounded-4">

<div class="card-body p-4">

<form action="/create" method="POST">

<div class="mb-3">

<label class="form-label fw-semibold">

Queue Name <span class="text-danger">*</span>

</label>

<input
type="text"
name="queue_name"
class="form-control"
placeholder="e.g. Reception, Pharmacy, Billing"
required>

</div>

<div class="mb-4">

<label class="form-label fw-semibold">

Description

</label>

<textarea
name="description"
class="form-control"
rows="4"
placeholder="Optional description"></textarea>

</div>

<div class="row">

<div class="col">

<button
type="submit"
class="btn btn-primary w-100">

<i class="bi bi-plus-circle"></i>

Create Queue

</button>

</div>

<div class="col">

<a href="/dashboard"
class="btn btn-light border w-100">

Cancel

</a>

</div>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
